<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SaniXperts Signature Builder</title>
  <style>
    :root {
      --navy: #07194a;
      --blue: #0d63e7;
      --ink: #142433;
      --muted: #607181;
      --line: #d8e4ee;
      --paper: #ffffff;
      --page: #f3f7fa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--page);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 6px;
      color: var(--navy);
      font-size: 26px;
      line-height: 1.15;
    }

    .subhead {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 14px 34px rgba(21, 49, 72, .08);
    }

    .toolbar {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 12px;
      padding: 18px;
      margin-bottom: 18px;
    }

    label {
      color: var(--navy);
      font-size: 12px;
      font-weight: 700;
    }

    input[type="range"] {
      width: 100%;
      height: 24px;
      padding: 0;
      cursor: pointer;
    }

    .scale-value,
    .size-value,
    .status {
      color: #405263;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    button {
      height: 38px;
      border: 1px solid #0b70bf;
      border-radius: 5px;
      color: #fff;
      background: #128ce1;
      padding: 0 14px;
      font: 700 13px Arial, Helvetica, sans-serif;
      cursor: pointer;
    }

    .chooser {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .template-card {
      height: auto;
      min-height: 118px;
      padding: 12px;
      text-align: left;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      font: inherit;
    }

    .template-card[aria-pressed="true"] {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(13, 99, 231, .16);
    }

    .template-card strong {
      display: block;
      color: var(--navy);
      font-size: 14px;
      margin-bottom: 4px;
    }

    .template-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .swatch {
      width: 100%;
      height: 42px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid rgba(0,0,0,.08);
      background: linear-gradient(90deg, #010b16, #061b2f 56%, #0e8ff0);
    }

    .preview-panel {
      padding: 18px;
      overflow: hidden;
    }

    .preview-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .preview-title h2 {
      margin: 0;
      color: var(--navy);
      font-size: 18px;
    }

    .preview-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .signature-stage {
      display: block;
      width: 100%;
      padding: 16px;
      background: #fff;
      border: 1px solid #e7eef4;
      box-shadow: 0 14px 34px rgba(18, 42, 60, .08);
      overflow: hidden;
    }

    .copy-source {
      position: absolute;
      left: -9999px;
      top: 0;
      width: auto;
      height: auto;
      overflow: visible;
      background: #fff;
    }

    @media (max-width: 660px) {
      main {
        padding: 16px;
      }

      .toolbar {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .preview-panel {
        padding: 12px;
      }

      .signature-stage {
        padding: 10px;
      }

      .status {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>SaniXperts Signature Builder</h1>
    <p class="subhead">Choose a signature template, adjust only the scale, then copy the selected signature. Contact details stay clickable.</p>

    <section class="panel toolbar" aria-label="Signature scale">
      <label for="scaleInput">Scale signature size</label>
      <input id="scaleInput" type="range" min="10" max="100" step="5" value="100">
      <span class="scale-value" id="scaleValue">100%</span>
      <button id="copyButton" type="button">Copy selected signature</button>
      <span class="size-value" id="sizeValue">760 x 253 px</span>
      <span class="status" id="status" aria-live="polite"></span>
    </section>

    <section class="chooser" aria-label="Template choices">
      <button class="template-card" type="button" data-template="vince" aria-pressed="true">
        <span class="swatch"></span>
        <strong>Vince Template 1</strong>
        <span>Existing Vince Yako signature.</span>
      </button>
      <button class="template-card" type="button" data-template="haron" aria-pressed="false">
        <span class="swatch"></span>
        <strong>Haron Template 2</strong>
        <span>Haron Toma signature based on the supplied artwork.</span>
      </button>
      <button class="template-card" type="button" data-template="haron3" aria-pressed="false">
        <span class="swatch"></span>
        <strong>Haron Template 3</strong>
        <span>Alternate Haron Toma signature artwork.</span>
      </button>
      <button class="template-card" type="button" data-template="vince4" aria-pressed="false">
        <span class="swatch"></span>
        <strong>Vince Template 4</strong>
        <span>White Vince Yako signature artwork.</span>
      </button>
      <button class="template-card" type="button" data-template="haron5" aria-pressed="false">
        <span class="swatch"></span>
        <strong>Haron Template 5</strong>
        <span>Premium Haron Toma signature artwork.</span>
      </button>
    </section>

    <section class="panel preview-panel" aria-label="Selected signature preview">
      <div class="preview-title">
        <h2 id="templateTitle">Vince Template 1</h2>
        <span id="templateHint">Template 1 of 5</span>
      </div>
      <div class="signature-stage" id="signaturePreview"></div>
    </section>

    <div class="copy-source" id="copySource" aria-hidden="true"></div>
  </main>

  <script>
    const BASE_WIDTH = 2172;
    const BASE_HEIGHT = 724;
    const DISPLAY_WIDTH = 760;
    const DISPLAY_HEIGHT = 253;
    const BASE_TO_DISPLAY = DISPLAY_WIDTH / BASE_WIDTH;
    const WEBSITE = 'https://www.SaniXperts.ca';
    const TRANSPARENT_PIXEL = 'https://sanixpertsim2-sanitation.github.io/Signature/transparent.png';

    const templates = {
      vince: {
        title: 'Vince Template 1',
        hint: 'Template 1 of 5',
        src: 'https://res.cloudinary.com/dydim1luz/image/upload/v1780445408/ChatGPT_Image_Jun_2_2026_08_09_24_PM_kmi4wb.png',
        alt: 'Vince Yako, Manager, SaniXperts Inc.',
        mapName: 'vince-template-1-map',
        bgColor: '#020b14',
        areas: [
          { label: 'SaniXperts website', href: WEBSITE, rect: [70, 70, 505, 520] },
          { label: 'Office: 289-674-7205', href: 'tel:+12896747205', rect: [1480, 70, 2030, 150] },
          { label: 'Cell: 289-683-2634', href: 'tel:+12896832634', rect: [1480, 150, 2020, 244] },
          { label: 'vince@sanixperts.ca', href: 'mailto:vince@sanixperts.ca', rect: [1480, 244, 2055, 326] },
          { label: 'www.SaniXperts.ca', href: WEBSITE, rect: [1476, 326, 2010, 407] },
          { label: '301-1882 Upper James St. Hamilton, ON L9B 1K4', href: 'https://www.google.com/maps/search/?api=1&query=301-1882%20Upper%20James%20St.%20Hamilton%2C%20ON%20L9B%201K4', rect: [1478, 407, 2110, 532] }
        ]
      },
      haron: {
        title: 'Haron Template 2',
        hint: 'Template 2 of 5',
        src: 'https://res.cloudinary.com/dydim1luz/image/upload/v1780523461/ChatGPT_Image_Jun_3_2026_05_47_21_PM_xcnjsa.png',
        alt: 'Haron Toma, Founder and CEO, SaniXperts Inc.',
        mapName: 'haron-template-2-map',
        bgColor: '#020b14',
        areas: [
          { label: 'SaniXperts website', href: WEBSITE, rect: [70, 70, 505, 520] },
          { label: '(905) 971-2019', href: 'tel:+19059712019', rect: [1480, 70, 2055, 150] },
          { label: 'haron@sanixperts.ca', href: 'mailto:haron@sanixperts.ca', rect: [1480, 150, 2085, 244] },
          { label: '(289) 674-7265', href: 'tel:+12896747265', rect: [1480, 244, 2050, 326] },
          { label: 'www.SaniXperts.ca', href: WEBSITE, rect: [1476, 326, 2010, 407] },
          { label: '301-1632 Upper James St. Hamilton, ON L9B1K4', href: 'https://www.google.com/maps/search/?api=1&query=301-1632%20Upper%20James%20St.%20Hamilton%2C%20ON%20L9B1K4', rect: [1478, 407, 2110, 532] }
        ]
      },
      haron3: {
        title: 'Haron Template 3',
        hint: 'Template 3 of 5',
        src: 'https://res.cloudinary.com/dydim1luz/image/upload/v1780523453/ChatGPT_Image_Jun_3_2026_05_47_13_PM_znlvgt.png',
        alt: 'Haron Toma, Founder and CEO, SaniXperts Inc.',
        mapName: 'haron-template-3-map',
        bgColor: '#020b14',
        areas: [
          { label: 'SaniXperts website', href: WEBSITE, rect: [95, 85, 510, 505] },
          { label: '(905) 971-2019', href: 'tel:+19059712019', rect: [1470, 80, 1935, 150] },
          { label: 'haron@sanixperts.ca', href: 'mailto:haron@sanixperts.ca', rect: [1470, 150, 2045, 225] },
          { label: '(289) 674-7265', href: 'tel:+12896747265', rect: [1470, 225, 1935, 300] },
          { label: 'www.SaniXperts.ca', href: WEBSITE, rect: [1470, 300, 2020, 375] },
          { label: '301-1632 Upper James St. Hamilton, ON L9B1K4', href: 'https://www.google.com/maps/search/?api=1&query=301-1632%20Upper%20James%20St.%20Hamilton%2C%20ON%20L9B1K4', rect: [1470, 375, 2095, 485] }
        ]
      },
      vince4: {
        title: 'Vince Template 4',
        hint: 'Template 4 of 5',
        src: 'https://res.cloudinary.com/dydim1luz/image/upload/v1780385961/ChatGPT_Image_Jun_2_2026_03_39_12_AM_oy9pyz.png',
        alt: 'Vince Yako, Manager, SaniXperts Inc.',
        mapName: 'vince-template-4-map',
        bgColor: '#ffffff',
        areas: [
          { label: 'SaniXperts website', href: WEBSITE, rect: [120, 120, 560, 520] },
          { label: 'Office: 289-674-7205', href: 'tel:+12896747205', rect: [1268, 96, 1785, 176] },
          { label: 'Cell: 289-683-2634', href: 'tel:+12896832634', rect: [1268, 176, 1760, 260] },
          { label: 'vince@sanixperts.ca', href: 'mailto:vince@sanixperts.ca', rect: [1268, 260, 1785, 344] },
          { label: 'www.SaniXperts.ca', href: WEBSITE, rect: [1268, 344, 1785, 430] },
          { label: '301-1882 Upper James St. Hamilton, ON L9B 1K4', href: 'https://www.google.com/maps/search/?api=1&query=301-1882%20Upper%20James%20St.%20Hamilton%2C%20ON%20L9B%201K4', rect: [1268, 430, 1845, 555] }
        ]
      },
      haron5: {
        title: 'Haron Template 5',
        hint: 'Template 5 of 5',
        src: 'https://res.cloudinary.com/dydim1luz/image/upload/v1780524723/ChatGPT_Image_Jun_3_2026_06_11_39_PM_pkzbyj.png',
        alt: 'Haron Toma, Founder and CEO, SaniXperts Inc.',
        mapName: 'haron-template-5-map',
        bgColor: '#020b14',
        areas: [
          { label: 'SaniXperts website', href: WEBSITE, rect: [120, 90, 700, 620] },
          { label: '(905) 971-2019', href: 'tel:+19059712019', rect: [825, 230, 1215, 305] },
          { label: 'haron@sanixperts.ca', href: 'mailto:haron@sanixperts.ca', rect: [825, 305, 1260, 380] },
          { label: '(289) 674-7265', href: 'tel:+12896747265', rect: [825, 380, 1215, 455] },
          { label: 'www.SaniXperts.ca', href: WEBSITE, rect: [825, 455, 1270, 530] },
          { label: '301-1632 Upper James St. Hamilton, ON L9B1K4', href: 'https://www.google.com/maps/search/?api=1&query=301-1632%20Upper%20James%20St.%20Hamilton%2C%20ON%20L9B1K4', rect: [825, 530, 1325, 640] }
        ]
      }
    };

    let selectedTemplate = 'vince';

    const scaleInput = document.getElementById('scaleInput');
    const scaleFactor = () => Number(scaleInput.value) / 100;
    const scaledRect = (rect, imageScale) => rect.map(value => Math.round(value * imageScale)).join(',');
    const copyWidth = () => 600;
    const copyHeight = () => Math.round(BASE_HEIGHT * (copyWidth() / BASE_WIDTH));
    const previewWidth = () => {
      const stage = document.getElementById('signaturePreview');
      const available = Math.max(220, stage.clientWidth - 2);
      return Math.min(copyWidth(), available);
    };

    const renderSignature = (template, width) => {
      const imageScale = width / BASE_WIDTH;
      const height = Math.round(BASE_HEIGHT * imageScale);
      const areas = template.areas.map(area => {
        const target = area.href.startsWith('http') ? ' target="_blank"' : '';
        return `<area shape="rect" coords="${scaledRect(area.rect, imageScale)}" href="${area.href}" alt="${area.label}"${target}>`;
      }).join('');

      return `<img src="${template.src}" width="${width}" height="${height}" usemap="#${template.mapName}" alt="${template.alt}" style="display:block;width:${width}px;height:${height}px;border:0;outline:none;text-decoration:none;"><map name="${template.mapName}">${areas}</map>`;
    };

    const uniqueSorted = values => [...new Set(values)].sort((a, b) => a - b);
    const cropUrl = (src, x, y, cropWidth, cropHeight, outputWidth) => {
      const transform = `c_crop,x_${x},y_${y},w_${cropWidth},h_${cropHeight}/c_scale,w_${outputWidth}`;
      return src.replace('/image/upload/', `/image/upload/${transform}/`);
    };
    const linkForBand = (areas, y1, y2) => {
      const cy = (y1 + y2) / 2;
      return areas.find(area => cy >= area.rect[1] && cy <= area.rect[3]);
    };

    const renderSlicedSignature = (template, width) => {
      const linkAreas = template.areas.filter(area => !area.label.toLowerCase().includes('sanixperts website'));
      const imageScale = width / BASE_WIDTH;
      const height = Math.round(BASE_HEIGHT * imageScale);
      const bgColor = template.bgColor || '#020b14';
      const minContactX = Math.min(...linkAreas.map(area => area.rect[0]));
      const maxContactX = Math.max(...linkAreas.map(area => area.rect[2]));
      const contactStart = Math.max(0, minContactX - 120);
      const contactEnd = maxContactX > BASE_WIDTH * .68 ? BASE_WIDTH : Math.min(BASE_WIDTH, maxContactX + 160);
      const yCuts = uniqueSorted([0, BASE_HEIGHT, ...linkAreas.flatMap(area => [area.rect[1], area.rect[3]])]);
      const scaledYCuts = yCuts.map(value => Math.round(value * imageScale));
      const leftWidth = Math.max(1, Math.round(contactStart * imageScale));
      const rightWidth = Math.max(0, Math.round((BASE_WIDTH - contactEnd) * imageScale));
      const contactWidth = Math.max(1, width - leftWidth - rightWidth);
      const cellStyle = `padding:0;margin:0;border:0;border-collapse:collapse;font-size:0;line-height:0;mso-line-height-rule:exactly;background:${bgColor};`;
      const imgStyle = 'display:block;border:0;outline:none;text-decoration:none;-ms-interpolation-mode:bicubic;';
      const leftSrc = cropUrl(template.src, 0, 0, contactStart, BASE_HEIGHT, leftWidth);
      const rightSrc = rightWidth ? cropUrl(template.src, contactEnd, 0, BASE_WIDTH - contactEnd, BASE_HEIGHT, rightWidth) : '';
      const leftImg = `<img src="${leftSrc}" width="${leftWidth}" height="${height}" style="${imgStyle}width:${leftWidth}px;height:${height}px;" alt="">`;
      const rightImg = rightWidth ? `<img src="${rightSrc}" width="${rightWidth}" height="${height}" style="${imgStyle}width:${rightWidth}px;height:${height}px;" alt="">` : '';
      const contactRows = [];

      for (let y = 0; y < yCuts.length - 1; y += 1) {
        const y1 = yCuts[y];
        const y2 = yCuts[y + 1];
        const rowHeight = Math.max(1, scaledYCuts[y + 1] - scaledYCuts[y]);
        const link = linkForBand(linkAreas, y1, y2);
        const src = cropUrl(template.src, contactStart, y1, contactEnd - contactStart, y2 - y1, contactWidth);
        const img = `<img src="${src}" width="${contactWidth}" height="${rowHeight}" style="${imgStyle}width:${contactWidth}px;height:${rowHeight}px;" alt="${link ? link.label : ''}">`;
        const content = link
          ? `<a href="${link.href}"${link.href.startsWith('http') ? ' target="_blank"' : ''} style="display:block;border:0;text-decoration:none;">${img}</a>`
          : img;
        contactRows.push(`<tr><td bgcolor="${bgColor}" width="${contactWidth}" height="${rowHeight}" style="width:${contactWidth}px;height:${rowHeight}px;${cellStyle}">${content}</td></tr>`);
      }

      const contactTable = `<table cellpadding="0" cellspacing="0" border="0" width="${contactWidth}" height="${height}" bgcolor="${bgColor}" style="border-collapse:collapse;border-spacing:0;mso-table-lspace:0pt;mso-table-rspace:0pt;width:${contactWidth}px;height:${height}px;table-layout:fixed;background:${bgColor};"><tbody>${contactRows.join('')}</tbody></table>`;
      return `<table cellpadding="0" cellspacing="0" border="0" width="${width}" height="${height}" bgcolor="${bgColor}" style="border-collapse:collapse;border-spacing:0;mso-table-lspace:0pt;mso-table-rspace:0pt;width:${width}px;height:${height}px;table-layout:fixed;background:${bgColor};"><tbody><tr><td bgcolor="${bgColor}" width="${leftWidth}" height="${height}" style="width:${leftWidth}px;height:${height}px;${cellStyle}">${leftImg}</td><td bgcolor="${bgColor}" width="${contactWidth}" height="${height}" style="width:${contactWidth}px;height:${height}px;${cellStyle}">${contactTable}</td>${rightWidth ? `<td bgcolor="${bgColor}" width="${rightWidth}" height="${height}" style="width:${rightWidth}px;height:${height}px;${cellStyle}">${rightImg}</td>` : ''}</tr></tbody></table>`;
    };

    const render = () => {
      const template = templates[selectedTemplate];
      const previewHtml = renderSignature(template, previewWidth());
      const copyHtml = renderSlicedSignature(template, copyWidth());

      document.getElementById('signaturePreview').innerHTML = previewHtml;
      document.getElementById('copySource').innerHTML = copyHtml;
      document.getElementById('templateTitle').textContent = template.title;
      document.getElementById('templateHint').textContent = template.hint;
      document.getElementById('scaleValue').textContent = `${scaleInput.value}%`;
      document.getElementById('sizeValue').textContent = `${copyWidth()} x ${copyHeight()} px`;
    };

    document.querySelectorAll('.template-card').forEach(card => {
      card.addEventListener('click', () => {
        selectedTemplate = card.dataset.template;
        document.querySelectorAll('.template-card').forEach(item => {
          item.setAttribute('aria-pressed', String(item === card));
        });
        document.getElementById('status').textContent = '';
        render();
      });
    });

    scaleInput.addEventListener('input', render);
    window.addEventListener('resize', render);

    const copyBySelection = source => {
      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(source);
      selection.removeAllRanges();
      selection.addRange(range);
      const copied = document.execCommand('copy');
      selection.removeAllRanges();
      return copied;
    };

    document.getElementById('copyButton').addEventListener('click', async () => {
      const source = document.getElementById('copySource');
      const html = source.innerHTML;
      try {
        if (!copyBySelection(source)) throw new Error('Selection copy failed');
        document.getElementById('status').textContent = 'Copied selected signature';
      } catch (error) {
        try {
          await navigator.clipboard.write([
            new ClipboardItem({
              'text/html': new Blob([html], { type: 'text/html' }),
              'text/plain': new Blob(['SaniXperts signature'], { type: 'text/plain' })
            })
          ]);
          document.getElementById('status').textContent = 'Copied selected signature';
        } catch (clipboardError) {
          document.getElementById('status').textContent = 'Copy blocked. Select the preview and copy manually.';
        }
      }
    });

    render();
  </script>
</body>
</html>
