<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaniXperts Outlook Signature Template</title>
  <style>
    :root {
      --scale: 0.35;
      --source-width: 2172;
      --source-height: 724;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      font-family: Arial, Helvetica, sans-serif;
      color: #16202b;
      background: #f3f6f9;
    }

    .editor {
      width: min(980px, 100%);
      margin: 0 auto 18px;
      padding: 18px;
      background: #fff;
      border: 1px solid #d9e2eb;
      border-radius: 7px;
      box-shadow: 0 12px 28px rgba(19, 45, 69, .09);
    }

    h1 {
      margin: 0 0 14px;
      color: #07194a;
      font-size: 20px;
      line-height: 1.2;
    }

    .controls {
      display: grid;
      grid-template-columns: 48px minmax(180px, 1fr) 56px auto auto;
      gap: 10px;
      align-items: center;
    }

    .controls span {
      color: #415062;
      font-size: 12px;
      font-weight: 700;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #128ce1;
      cursor: pointer;
    }

    button {
      height: 36px;
      padding: 0 14px;
      border: 1px solid #0d77c7;
      border-radius: 5px;
      color: #fff;
      background: #128ce1;
      font: 700 13px Arial, Helvetica, sans-serif;
      cursor: pointer;
    }

    .status {
      color: #415062;
      font-size: 12px;
      font-weight: 700;
    }

    .stage {
      width: 100%;
      overflow: auto;
      padding-bottom: 20px;
    }

    .signature-wrap {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 18px;
      background: #fff;
      border: 1px solid #d9e2eb;
      border-radius: 7px;
      box-shadow: 0 12px 28px rgba(19, 45, 69, .09);
    }

    .signature-img {
      display: block;
      width: calc(2172px * var(--scale));
      max-width: 100%;
      height: auto;
      border: 0;
      outline: none;
      text-decoration: none;
    }

    .note {
      width: min(980px, 100%);
      margin: 12px auto 0;
      color: #5e6d7b;
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 720px) {
      body {
        padding: 12px;
      }

      .controls {
        grid-template-columns: 44px 1fr 52px;
      }

      button,
      .status {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <section class="editor" aria-label="Signature controls">
    <h1>SaniXperts Outlook Signature</h1>
    <div class="controls">
      <span>Small</span>
      <input id="scaleControl" type="range" min="0.20" max="0.55" value="0.35" step="0.01" />
      <span id="scaleValue">35%</span>
      <button id="copySignature" type="button">Copy signature</button>
      <span class="status" id="copyStatus" aria-live="polite"></span>
    </div>
  </section>

  <main class="stage" aria-label="Signature preview">
    <div class="signature-wrap">
      <img
        id="signatureImage"
        class="signature-img"
        src="sanixperts-reference-signature.png"
        width="760"
        alt="SaniXperts email signature"
        usemap="#preview-signature-map">
      <map name="preview-signature-map" id="previewMap"></map>
    </div>
  </main>

  <p class="note">
    This version copies as one smooth image with clickable contact areas, so Outlook web will not show table/grid lines around the signature.
  </p>

  <script>
    const SOURCE_WIDTH = 2172;
    const SOURCE_HEIGHT = 724;
    const image = document.getElementById('signatureImage');
    const scaleControl = document.getElementById('scaleControl');
    const scaleValue = document.getElementById('scaleValue');
    const status = document.getElementById('copyStatus');
    const previewMap = document.getElementById('previewMap');

    const linkAreas = [
      {
        label: 'SaniXperts website',
        href: 'https://www.SaniXperts.ca',
        rect: [60, 80, 520, 560]
      },
      {
        label: 'Call office phone',
        href: 'tel:2896747205',
        rect: [1480, 70, 1995, 150]
      },
      {
        label: 'Call cell phone',
        href: 'tel:2896832634',
        rect: [1480, 150, 1995, 244]
      },
      {
        label: 'Send email',
        href: 'mailto:vince@sanixperts.ca',
        rect: [1480, 244, 2030, 326]
      },
      {
        label: 'Open SaniXperts website',
        href: 'https://www.SaniXperts.ca',
        rect: [1476, 326, 1968, 407]
      },
      {
        label: 'Open address in maps',
        href: 'https://www.google.com/maps/search/?api=1&query=301-1882%20Upper%20James%20St.%20Hamilton%2C%20ON%20L9B%201K4',
        rect: [1478, 407, 2088, 519]
      }
    ];

    const scaledCoords = (rect, scale) => rect.map(value => Math.round(value * scale)).join(',');

    const updateScale = () => {
      const scale = Number(scaleControl.value);
      document.documentElement.style.setProperty('--scale', scale);
      scaleValue.textContent = `${Math.round(scale * 100)}%`;
      image.width = Math.round(SOURCE_WIDTH * scale);
      image.height = Math.round(SOURCE_HEIGHT * scale);
      previewMap.innerHTML = linkAreas.map(area =>
        `<area shape="rect" coords="${scaledCoords(area.rect, scale)}" href="${area.href}" alt="${area.label}" target="_blank">`
      ).join('');
    };

    const buildCopyHtml = () => {
      const scale = Number(scaleControl.value);
      const width = Math.round(SOURCE_WIDTH * scale);
      const height = Math.round(SOURCE_HEIGHT * scale);
      const mapName = `sx-signature-map-${Date.now()}`;
      const areas = linkAreas.map(area =>
        `<area shape="rect" coords="${scaledCoords(area.rect, scale)}" href="${area.href}" alt="${area.label}" target="_blank">`
      ).join('');

      return `<img src="https://sanixpertsim2-sanitation.github.io/Signature/sanixperts-reference-signature.png" width="${width}" height="${height}" usemap="#${mapName}" alt="SaniXperts email signature" style="display:block;width:${width}px;max-width:100%;height:auto;border:0;outline:none;text-decoration:none;"><map name="${mapName}">${areas}</map>`;
    };

    document.getElementById('copySignature').addEventListener('click', async () => {
      try {
        const html = buildCopyHtml();
        await navigator.clipboard.write([
          new ClipboardItem({
            'text/html': new Blob([html], { type: 'text/html' }),
            'text/plain': new Blob(['SaniXperts signature'], { type: 'text/plain' })
          })
        ]);
        status.textContent = 'Copied without grid lines';
      } catch (error) {
        status.textContent = 'Copy blocked. Select the signature image and copy manually.';
      }
    });

    scaleControl.addEventListener('input', updateScale);
    updateScale();
  </script>
</body>
</html>
